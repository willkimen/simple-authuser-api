# docker-compose.yml used to set up the application services, including a Django server and a PostgreSQL database.
services:
  apiprod:
    container_name: apiprod  # Name of the container for the API service.
    build:
      context: ./../api/  
      dockerfile: ./../docker/Dockerfile.prod  # Name of the Dockerfile to be used for building the image.
    ports:
      - 8000:8000  # Maps port 8000 of the container to port 8000 of the host.
    env_file:
      - ./../api/environments/.env.production  # Production environment variables file.
    command: ["sh", "-c", "chmod -R +x /api/scripts && commands.sh"]  # Executes the command script with appropriate permissions.
    depends_on:
      - psql  # This service depends on the psql container.
    networks:
        - db_api

  psql:
    container_name: psql
    build:
      context: ./../api/  
      dockerfile: ./../docker/Dockerfile.prod-postgres
      args:
        DB_NAME: auth_db # set database name for Dockerfile.prod-postgres 
    container_name: psql  # Name of the container for the PostgreSQL service.
    volumes:
      - postgres_data:/var/lib/postgresql/data/  # Mounts a persistent volume for PostgreSQL data.
    env_file:
      - ./../api/environments/.env.production  # Production environment variables file for PostgreSQL.
    ports:
      - 5432:5432  # Maps port 5432 of the container to port 5432 of the host.
    networks:
        - db_api

volumes:
  postgres_data:  # Persistent volume to store PostgreSQL data.

networks:
  db_api:
    driver: bridge
