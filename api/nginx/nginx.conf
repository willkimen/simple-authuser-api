# -----------------------------------------------------------------------------
# Nginx Configuration for Django API Container
#
# This configuration sets up Nginx as a reverse proxy for the Django API, 
# ensuring secure HTTPS communication, request limiting, and connection limiting.
#
# Functionality:
# - Redirects HTTP traffic to HTTPS.
# - Configures SSL/TLS with strong ciphers for security.
# - Limits the rate of incoming requests to prevent abuse.
# - Restricts the number of concurrent connections per client.
# - Defines a reverse proxy to route requests to the Django API container.
# - Blocks access from certain user agents like wget, curl, and scanners.
#
# Important Notes:
# - The Django API runs inside a Docker container named "api".
# - SSL certificates should be placed in "/etc/nginx/ssl/crt.pem" and "/etc/nginx/ssl/key.pem".
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type  application/octet-stream;
    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    server {
        listen 80;
        server_name localhost;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/crt.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /api/v1/ {
            limit_req zone=one burst=20 nodelay;
            limit_conn addr 20;

            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }

        location /static/ {
            alias /static/;
        }

        location /admin/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }

        location /schema/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }

        if ($http_user_agent ~* (wget|curl|scanner)) {
            return 403;
        }
    }

    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
